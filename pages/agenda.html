<script>
  // ── DATA ──
  const SERVICES = ['Corte Simples','Corte + Barba','Barba Completa','Degradê + Barba','Pigmentação'];
  const BARBERS  = ['João Rafael','Carlos Melo','Felipe Santos'];
  const CLIENTS  = ['Rafael Mendes','Lucas Silva','Pedro Oliveira','Matheus Costa','Bruno Ferreira',
                    'Gabriel Neves','Henrique Lopes','André Castro','Felipe Rocha','Rodrigo Dias',
                    'Thiago Nunes','Gustavo Lima','Diego Alves','Leandro Moura','Caio Ribeiro'];
  const STATUSES = ['confirmed','confirmed','confirmed','pending','done','partial'];
  const HOURS    = ['08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00'];

  // Seeded random so it's stable per load
  let seed = 42;
  function rand(max) { seed = (seed * 1664525 + 1013904223) & 0xffffffff; return Math.abs(seed) % max; }
  function pick(arr) { return arr[rand(arr.length)]; }

  // Build appointments for current week
  function buildAppts(weekStart) {
    seed = 42;
    const appts = {};
    for (let d = 0; d < 7; d++) {
      const day = new Date(weekStart);
      day.setDate(day.getDate() + d);
      const key = day.toDateString();
      appts[key] = [];
      if (d === 6) continue; // Sunday sparse
      const count = d === 5 ? 8 : (d === 0 ? 4 : 5 + rand(4));
      const usedHours = new Set();
      for (let i = 0; i < count; i++) {
        let h;
        do { h = pick(HOURS); } while (usedHours.has(h));
        usedHours.add(h);
        appts[key].push({
          client: pick(CLIENTS),
          service: pick(SERVICES),
          time: h,
          barber: pick(BARBERS),
          status: pick(STATUSES)
        });
      }
      appts[key].sort((a,b) => a.time.localeCompare(b.time));
    }
    return appts;
  }

  // ── STATE ──
  let currentWeekStart = getMonday(new Date());

  function getMonday(d) {
    const m = new Date(d);
    const day = m.getDay();
    const diff = (day === 0) ? -6 : 1 - day;
    m.setDate(m.getDate() + diff);
    m.setHours(0,0,0,0);
    return m;
  }

  const DAY_NAMES = ['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
  const MONTHS_PT = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

  function fmt(d) { return `${d.getDate().toString().padStart(2,'0')} ${MONTHS_PT[d.getMonth()]}`; }

  function renderCalendar() {
    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';
    const appts = buildAppts(currentWeekStart);
    const today = new Date(); today.setHours(0,0,0,0);

    // Week label
    const weekEnd = new Date(currentWeekStart);
    weekEnd.setDate(weekEnd.getDate() + 6);
    document.getElementById('weekLabel').textContent =
      `${fmt(currentWeekStart)} – ${fmt(weekEnd)}`;

    // Header row: empty corner + 7 day headers
    grid.appendChild(Object.assign(document.createElement('div'), { className:'cal-header-empty' }));

    for (let d = 0; d < 7; d++) {
      const day = new Date(currentWeekStart);
      day.setDate(day.getDate() + d);
      const isToday = day.getTime() === today.getTime();
      const cell = document.createElement('div');
      cell.className = 'cal-day-header' + (isToday ? ' today' : '');
      cell.innerHTML = `<div class="cal-day-name">${DAY_NAMES[d]}</div>
                        <div class="cal-day-num">${day.getDate()}</div>`;
      grid.appendChild(cell);
    }

    // Time rows
    HOURS.forEach(hour => {
      const timeCell = document.createElement('div');
      timeCell.className = 'cal-time-label';
      timeCell.textContent = hour;
      grid.appendChild(timeCell);

      for (let d = 0; d < 7; d++) {
        const day = new Date(currentWeekStart);
        day.setDate(day.getDate() + d);
        const isToday = day.getTime() === today.getTime();
        const cell = document.createElement('div');
        cell.className = 'cal-cell' + (isToday ? ' today-col' : '');

        const dayAppts = (appts[day.toDateString()] || []).filter(a => a.time === hour);
        dayAppts.forEach(appt => {
          const block = document.createElement('div');
          block.className = `appt-block ${appt.status}`;
          block.innerHTML = `<div class="appt-client">${appt.client.split(' ')[0]}</div>
                             <div class="appt-svc">${appt.service}</div>`;
          block.addEventListener('mouseenter', (e) => showTooltip(e, appt));
          block.addEventListener('mouseleave', hideTooltip);
          cell.appendChild(block);
        });

        grid.appendChild(cell);
      }
    });
  }

  // ── TOOLTIP ──
  const tooltip = document.getElementById('tooltip');
  function showTooltip(e, appt) {
    document.getElementById('tt-name').textContent = appt.client;
    document.getElementById('tt-time').textContent = appt.time;
    document.getElementById('tt-svc').textContent = appt.service;
    document.getElementById('tt-barber').textContent = appt.barber;
    const rect = e.target.getBoundingClientRect();
    tooltip.style.left = Math.min(rect.right + 10, window.innerWidth - 220) + 'px';
    tooltip.style.top  = Math.max(rect.top - 10, 10) + 'px';
    tooltip.classList.add('visible');
  }

  function hideTooltip() { tooltip.classList.remove('visible'); }

  // ── NAVIGATION ──
  document.getElementById('prevBtn').addEventListener('click', () => {
    currentWeekStart.setDate(currentWeekStart.getDate() - 7);
    renderCalendar();
  });

  document.getElementById('nextBtn').addEventListener('click', () => {
    currentWeekStart.setDate(currentWeekStart.getDate() + 7);
    renderCalendar();
  });

  document.getElementById('todayBtn').addEventListener('click', () => {
    currentWeekStart = getMonday(new Date());
    renderCalendar();
  });


  function openNewAppt() {
    // Set today as default date
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('m-data').value = today;
    document.getElementById('modalOverlay').classList.add('open');
  }

  function fecharModal(e) {
    if (e && e.target !== document.getElementById('modalOverlay')) return;
    document.getElementById('modalOverlay').classList.remove('open');
  }

  function salvarAgendamento() {
    const cliente = document.getElementById('m-cliente').value.trim();
    const servico = document.getElementById('m-servico').value;
    const barbeiro = document.getElementById('m-barbeiro').value;
    const data = document.getElementById('m-data').value;
    const horario = document.getElementById('m-horario').value;
    if (!cliente || !servico || !barbeiro || !data || !horario) {
      // Highlight empty fields
      ['m-cliente','m-servico','m-barbeiro','m-data','m-horario'].forEach(id => {
        const el = document.getElementById(id);
        if (!el.value.trim()) { el.style.borderColor = '#dc2626'; el.style.boxShadow = '0 0 0 3px rgba(220,38,38,.1)'; }
        else { el.style.borderColor = ''; el.style.boxShadow = ''; }
      });
      return;
    }
    document.getElementById('modalOverlay').classList.remove('open');
    // Reset form
    ['m-cliente','m-telefone','m-servico','m-barbeiro','m-data','m-horario','m-obs'].forEach(id => {
      document.getElementById(id).value = '';
      document.getElementById(id).style.borderColor = '';
      document.getElementById(id).style.boxShadow = '';
    });
  }

  // Close on Escape
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') document.getElementById('modalOverlay').classList.remove('open');
  });

  // ── TOPBAR DATE ──
  const now = new Date();
  const opts = { weekday:'long', day:'numeric', month:'long', year:'numeric' };
  document.getElementById('topbar-date').textContent = now.toLocaleDateString('pt-BR', opts);

  // ── INIT ──
  renderCalendar();

  // Animate panel
  const obs = new IntersectionObserver(entries => {
    entries.forEach((e, i) => {
      if (e.isIntersecting) {
        setTimeout(() => e.target.classList.add('visible'), i * 60);
        obs.unobserve(e.target);
      }
    });
  }, { threshold: 0.05 });
  document.querySelectorAll('.panel').forEach(el => obs.observe(el));
</script>
